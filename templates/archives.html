<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archives — AI Wingman</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="app">
<header class="topbar">
  <a class="brand" href="/app">AI Wingman</a>
  <nav>
    <a href="/app" class="navlink">Suggestions</a>
    <a href="/coaching" class="navlink">Coaching</a>
    <a href="/archives" class="navlink active">Archives</a>
    <a href="/logout" class="navlink logout-link">Logout</a>
  </nav>
</header>

<nav class="bottom-tabs">
  <a href="/app" class="btab">
    <svg class="btab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span class="btab-label">Chat</span>
  </a>
  <a href="/coaching" class="btab">
    <svg class="btab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="3" y1="21" x2="21" y2="21"/>
      <rect x="6" y="13" width="3" height="6" rx="0.5"/>
      <rect x="11" y="9" width="3" height="10" rx="0.5"/>
      <rect x="16" y="5" width="3" height="14" rx="0.5"/>
    </svg>
    <span class="btab-label">Coach</span>
  </a>
  <a href="/archives" class="btab active">
    <svg class="btab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="2" y="3" width="20" height="5" rx="1"/>
      <path d="M4 8v12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V8"/>
      <line x1="10" y1="13" x2="14" y2="13"/>
    </svg>
    <span class="btab-label">Archive</span>
  </a>
  <a href="/logout" class="btab">
    <svg class="btab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span class="btab-label">Logout</span>
  </a>
</nav>

<main class="coaching">
  <h1>Archives</h1>
  <p class="microcopy">
    Every reset chat lives here, ready to be analyzed solo. Expand a session,
    hit Analyze, and get the funny breakdown — same pipeline as paste-a-chat.
  </p>

  <ul class="archive-list" id="archive-list">
    <li class="muted">Loading the vault...</li>
  </ul>
</main>

<div class="spinner hidden" id="spinner">
  <div class="spinner-dot"></div><span id="spinner-msg">Cooking...</span>
</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
